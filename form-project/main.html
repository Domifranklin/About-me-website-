<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="form.css">
  </head>
  <body>
    <form action="#" method="POST">
      <h1>Survey Form</h1>

      <fieldset>
        <legend>Personal Info</legend>

        <label for="full-name">Full Name:</label>
        <input id="full-name" type="text" name="full-name" placeholder="John Doe" required>

        <label for="email">Email Address:</label>
        <input id="email" type="email" name="email" placeholder="example@gmail.com" required>

        <label for="age">Age:</label>
        <input id="age" type="number" name="age" min="18" max="80" required>

        <label for="phone-number">Phone number</label>
        <input id="phone-number" type="tel" name="phone-number" placeholder="Enter phone number here" required>
      </fieldset>

      <fieldset>
        <legend>Experience Level</legend>

        <label for="beginner">Beginner</label>
        <input id="beginner" type="radio" name="level" value="beginner">

        <label for="intermediate">Intermediate</label>
        <input id="intermediate" type="radio" name="level" value="intermediate">

        <label for="advanced">Advanced</label>
        <input id="advanced" type="radio" name="level" value="advanced">
      </fieldset>

      <fieldset>
        <legend>What are you interested in?</legend>
        
        <input id="coding" type="checkbox" name="interest" value="coding">
        <label for="coding">Coding</label>

        <input id="cars" type="checkbox" name="interest" value="cars">
        <label for="cars">Cars</label>

        <input id="ai" type="checkbox" name="interest" value="ai">
        <label for="ai">AI</label>
      </fieldset>

        <label for="feedback">Your feedback:</label>
        <textarea id="feedback" name="feedback" rows="8" placeholder="Write your message here..."></textarea>

        <button type="submit">Submit</button>

    </form>
  </body>
</html>
